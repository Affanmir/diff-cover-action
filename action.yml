name: 'Diff Cover — PR Coverage & Quality Reports'
description: 'Diff coverage and quality reports for pull requests. PR comments, inline annotations, badges. Supports 13+ linters. No vendor lock-in.'

inputs:
  # Mode
  mode:
    description: 'Run mode: "coverage" for diff-cover or "quality" for diff-quality'
    required: false
    default: 'coverage'

  # Coverage mode inputs
  coverage-files:
    description: 'Space-separated coverage report paths (XML or lcov). Supports glob patterns. Required when mode=coverage.'
    required: false
    default: ''

  # Quality mode inputs
  violations:
    description: 'Code quality tool name. Supported: pycodestyle, pyflakes, flake8, pylint, ruff.check, mypy, checkstyle, checkstylexml, clang, cppcheck, eslint, jshint, pydocstyle, shellcheck. Required when mode=quality.'
    required: false
    default: ''
  quality-input-reports:
    description: 'Space-separated pre-generated violation report files for diff-quality.'
    required: false
    default: ''
  quality-options:
    description: 'Pass-through arguments to the violations tool.'
    required: false
    default: ''

  # Git diff options
  compare-branch:
    description: 'Branch to compare against for the diff.'
    required: false
    default: 'origin/main'
  diff-range-notation:
    description: 'Git diff range notation: "..." (default) or ".."'
    required: false
    default: '...'
  diff-file:
    description: 'Path to a pre-generated diff file. Overrides git branch comparison.'
    required: false
    default: ''
  ignore-staged:
    description: 'Exclude staged changes from the diff.'
    required: false
    default: 'false'
  ignore-unstaged:
    description: 'Exclude unstaged changes from the diff.'
    required: false
    default: 'false'
  include-untracked:
    description: 'Include untracked files in the diff.'
    required: false
    default: 'false'
  ignore-whitespace:
    description: 'Ignore whitespace changes in the diff.'
    required: false
    default: 'false'

  # Filtering
  exclude:
    description: 'Newline-separated fnmatch patterns to exclude files.'
    required: false
    default: ''
  include:
    description: 'Newline-separated glob patterns to include files.'
    required: false
    default: ''
  src-roots:
    description: 'Space-separated source root directories (needed for JaCoCo reports).'
    required: false
    default: ''

  # Report options
  expand-coverage-report:
    description: 'Add unreported lines with same hit count as previous line (XML only).'
    required: false
    default: 'false'
  show-uncovered:
    description: 'Display uncovered lines in console output.'
    required: false
    default: 'false'
  quiet:
    description: 'Suppress info/warning messages, show only errors.'
    required: false
    default: 'false'
  config-file:
    description: 'Path to a TOML configuration file for diff-cover.'
    required: false
    default: ''

  # Threshold
  fail-under:
    description: 'Minimum acceptable coverage/quality percentage (0-100). Default 0 means no threshold.'
    required: false
    default: '0'
  fail-on-threshold:
    description: 'If true, fail the step when coverage is below fail-under. If false, only report.'
    required: false
    default: 'true'

  # GitHub integration
  github-token:
    description: 'GitHub token for PR comments and check annotations. Defaults to the built-in GITHUB_TOKEN.'
    required: false
    default: ''
  post-comment:
    description: 'Post or update a PR comment with results.'
    required: false
    default: 'true'
  comment-identifier:
    description: 'Unique string to identify and update existing comments instead of creating new ones.'
    required: false
    default: 'diff-cover-action'
  create-annotations:
    description: 'Create inline annotations on uncovered or violating lines.'
    required: false
    default: 'true'
  annotation-type:
    description: 'Annotation severity: "warning", "error", or "notice".'
    required: false
    default: 'warning'
  annotation-limit:
    description: 'Maximum number of annotations to create. GitHub caps at 50 per job.'
    required: false
    default: '50'
  create-badge:
    description: 'Generate a shields.io endpoint JSON file for badge display.'
    required: false
    default: 'false'
  badge-filename:
    description: 'Output filename for the shields.io badge JSON.'
    required: false
    default: 'diff-cover-badge.json'

outputs:
  total-percent:
    description: 'Overall coverage or quality percentage (integer).'
    value: ${{ steps.diff-cover.outputs.total-percent }}
  total-percent-float:
    description: 'Overall percentage with two decimal places.'
    value: ${{ steps.diff-cover.outputs.total-percent-float }}
  total-lines:
    description: 'Total number of lines in the diff.'
    value: ${{ steps.diff-cover.outputs.total-lines }}
  total-violations:
    description: 'Number of uncovered or violating lines.'
    value: ${{ steps.diff-cover.outputs.total-violations }}
  files-changed:
    description: 'Number of files with changes in the diff.'
    value: ${{ steps.diff-cover.outputs.files-changed }}
  threshold-met:
    description: '"true" if coverage meets fail-under threshold, "false" otherwise.'
    value: ${{ steps.diff-cover.outputs.threshold-met }}
  comment-id:
    description: 'ID of the created or updated PR comment. Empty if no comment was posted.'
    value: ${{ steps.diff-cover.outputs.comment-id }}
  report-json:
    description: 'Path to the generated JSON report file.'
    value: ${{ steps.diff-cover.outputs.report-json }}
  badge-json:
    description: 'Path to the generated badge JSON file. Empty if not generated.'
    value: ${{ steps.diff-cover.outputs.badge-json }}
  exit-code:
    description: 'Raw exit code from the diff-cover CLI.'
    value: ${{ steps.diff-cover.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Install Python dependencies
      shell: bash
      run: pip install --quiet --no-cache-dir -r "${{ github.action_path }}/requirements.txt"

    - name: Configure git safe directory
      shell: bash
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Run diff-cover
      id: diff-cover
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        # Composite actions don't auto-set INPUT_* env vars — pass them explicitly
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_COVERAGE-FILES: ${{ inputs.coverage-files }}
        INPUT_VIOLATIONS: ${{ inputs.violations }}
        INPUT_QUALITY-INPUT-REPORTS: ${{ inputs.quality-input-reports }}
        INPUT_QUALITY-OPTIONS: ${{ inputs.quality-options }}
        INPUT_COMPARE-BRANCH: ${{ inputs.compare-branch }}
        INPUT_DIFF-RANGE-NOTATION: ${{ inputs.diff-range-notation }}
        INPUT_DIFF-FILE: ${{ inputs.diff-file }}
        INPUT_IGNORE-STAGED: ${{ inputs.ignore-staged }}
        INPUT_IGNORE-UNSTAGED: ${{ inputs.ignore-unstaged }}
        INPUT_INCLUDE-UNTRACKED: ${{ inputs.include-untracked }}
        INPUT_IGNORE-WHITESPACE: ${{ inputs.ignore-whitespace }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_INCLUDE: ${{ inputs.include }}
        INPUT_SRC-ROOTS: ${{ inputs.src-roots }}
        INPUT_EXPAND-COVERAGE-REPORT: ${{ inputs.expand-coverage-report }}
        INPUT_SHOW-UNCOVERED: ${{ inputs.show-uncovered }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_CONFIG-FILE: ${{ inputs.config-file }}
        INPUT_FAIL-UNDER: ${{ inputs.fail-under }}
        INPUT_FAIL-ON-THRESHOLD: ${{ inputs.fail-on-threshold }}
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token || github.token }}
        INPUT_POST-COMMENT: ${{ inputs.post-comment }}
        INPUT_COMMENT-IDENTIFIER: ${{ inputs.comment-identifier }}
        INPUT_CREATE-ANNOTATIONS: ${{ inputs.create-annotations }}
        INPUT_ANNOTATION-TYPE: ${{ inputs.annotation-type }}
        INPUT_ANNOTATION-LIMIT: ${{ inputs.annotation-limit }}
        INPUT_CREATE-BADGE: ${{ inputs.create-badge }}
        INPUT_BADGE-FILENAME: ${{ inputs.badge-filename }}
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: |
        export PYTHONPATH="${{ github.action_path }}:${PYTHONPATH:-}"
        python "${{ github.action_path }}/entrypoint.py"

branding:
  icon: 'shield'
  color: 'blue'
